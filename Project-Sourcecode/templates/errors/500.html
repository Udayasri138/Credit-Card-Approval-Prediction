{% extends "base.html" %}
{% block title %}500 – Server Error{% endblock %}
{% block content %}
<div class="error-page glass fade-in">
  <div class="error-code">500</div>
  <h2>Internal Server Error</h2>
  <p class="text-muted">Something went wrong on our end. Please try again later.</p>
  <a href="{{ url_for('dashboard') }}" class="btn-primary-glow mt-3">
    <i class="bi bi-house-fill me-2"></i>Go to Dashboard
  </a>
</div>
{% endblock %}
